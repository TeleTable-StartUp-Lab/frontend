<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Favicons & PWA -->
  <link rel="icon" href="%PUBLIC_URL%/favicon.ico" sizes="any" />
  <link rel="icon" href="%PUBLIC_URL%/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/og-image.png" />
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

  <!-- Primary SEO -->
  <title>TeleTable – The Future of Medical Care</title>
  <meta name="description" content="Autonomous transport system for the modern Care Center. Efficient, smart, and always there when you need it." />
  <meta name="keywords" content="TeleTable, autonomous transport, medical care, care center, robot, telemetry, smart healthcare, autonomous robot" />
  <meta name="author" content="TeleTable Team" />
  <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large" />
  <link rel="canonical" href="https://teletable.net/" />

  <!-- Appearance -->
  <meta name="theme-color" content="#00f0ff" />
  <meta name="color-scheme" content="dark" />

  <!-- PWA / Mobile -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TeleTable" />
  <meta name="application-name" content="TeleTable" />
  <meta name="format-detection" content="telephone=no" />

  <!-- Open Graph / WhatsApp / Facebook / LinkedIn
       NOTE: og:image MUST be an absolute URL for social crawlers. -->
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="en_US" />
  <meta property="og:site_name" content="TeleTable" />
  <meta property="og:url" content="https://teletable.net/" />
  <meta property="og:title" content="TeleTable – The Future of Medical Care" />
  <meta property="og:description" content="Autonomous transport system for the modern Care Center. Efficient, smart, and always there when you need it." />
  <meta property="og:image" content="https://teletable.net/og-image.png" />
  <meta property="og:image:secure_url" content="https://teletable.net/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:alt" content="TeleTable – autonomous medical transport robot" />

  <!-- Twitter / X Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@TeleTable" />
  <meta name="twitter:title" content="TeleTable – The Future of Medical Care" />
  <meta name="twitter:description" content="Autonomous transport system for the modern Care Center. Efficient, smart, and always there when you need it." />
  <meta name="twitter:image" content="https://teletable.net/og-image.png" />
  <meta name="twitter:image:alt" content="TeleTable – autonomous medical transport robot" />

  <!-- Structured Data (JSON-LD) – enables Google rich results -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "TeleTable",
    "url": "https://teletable.net",
    "logo": "https://teletable.net/og-image.png",
    "description": "Autonomous transport system for the modern Care Center. Efficient, smart, and always there when you need it.",
    "sameAs": []
  }
  </script>

  <!-- Performance: preconnect to common third-party origins -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
</body>

</html>
